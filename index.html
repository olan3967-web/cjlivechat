<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CJ智能客服 | 实时对话</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #ffffff; }
        
        .gradient-bg { background: linear-gradient(135deg, #0a0e27 0%, #1a1a3e 50%, #0d1117 100%); }
        
        .chat-interface {
            position: fixed; bottom: 0; left: 0; right: 0; top: 0;
            background: #f5f7fa; z-index: 10000; display: none; flex-direction: column;
        }
        .chat-interface.open { display: flex; }
        
        .chat-header {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white; padding: 16px 20px; display: flex; align-items: center; gap: 12px;
        }
        .back-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; width: 32px; height: 32px; border-radius: 50%; }
        .back-btn:hover { background: rgba(255,255,255,0.2); }
        
        .messages-container {
            flex: 1; overflow-y: auto; padding: 20px; background: #f5f7fa;
            display: flex; flex-direction: column; gap: 12px;
        }
        
        .message { display: flex; max-width: 80%; margin-bottom: 4px; }
        .message.user { align-self: flex-end; justify-content: flex-end; }
        .message.admin { align-self: flex-start; }
        
        .bubble {
            padding: 10px 14px; border-radius: 18px; word-wrap: break-word; max-width: 100%;
        }
        .user .bubble {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white; border-bottom-right-radius: 4px;
        }
        .admin .bubble {
            background: white; color: #1f2937; border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .message-time { font-size: 10px; margin-top: 4px; color: #9ca3af; }
        .user .message-time { text-align: right; }
        
        .replies { margin-top: 8px; margin-right: 20px; border-right: 2px solid #e5e7eb; padding-right: 12px; }
        .reply-item { margin-top: 8px; display: flex; justify-content: flex-start; }
        .reply-bubble { background: white; color: #1f2937; padding: 8px 12px; border-radius: 18px; font-size: 12px; max-width: 80%; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .reply-time { font-size: 9px; color: #9ca3af; margin-top: 2px; }
        
        .input-area {
            background: white; border-top: 1px solid #e5e7eb;
            padding: 12px 16px; display: flex; gap: 12px; align-items: center;
        }
        .input-wrapper {
            flex: 1; display: flex; gap: 8px; align-items: center;
            background: #f5f7fa; border-radius: 28px; padding: 4px 8px 4px 16px;
            border: 1px solid #e5e7eb;
        }
        .input-wrapper input { flex: 1; background: transparent; border: none; padding: 10px 0; outline: none; font-size: 15px; }
        .send-btn {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            border: none; color: white; width: 44px; height: 44px; border-radius: 50%;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .send-btn:hover { transform: scale(1.05); opacity: 0.9; }
        
        .info-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
            display: none; align-items: center; justify-content: center; z-index: 10001;
        }
        .info-modal.show { display: flex; }
        .info-card {
            background: white; border-radius: 24px; padding: 32px;
            width: 450px; max-width: 90%; max-height: 85vh; overflow-y: auto;
        }
        .info-card input, .info-card textarea {
            width: 100%; border: 1px solid #e5e7eb; border-radius: 12px;
            padding: 12px 16px; margin-bottom: 16px; outline: none; font-size: 15px;
        }
        .start-btn {
            width: 100%; background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white; border: none; padding: 14px; border-radius: 12px;
            font-weight: 600; cursor: pointer;
        }
        
        .landing-btn {
            position: fixed; bottom: 24px; right: 24px;
            width: 60px; height: 60px; background: linear-gradient(135deg, #2563eb, #7c3aed);
            color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 4px 20px rgba(37,99,235,0.4); z-index: 9999;
        }
        .landing-btn:hover { transform: scale(1.1); }
        
        .toast-msg {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: white; padding: 10px 20px;
            border-radius: 40px; font-size: 14px; z-index: 10002;
            pointer-events: none; opacity: 0; transition: opacity 0.2s;
        }
        
        .form-label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; color: #374151; }
        .required-star { color: #ef4444; }
        .online-dot { display: inline-block; width: 8px; height: 8px; background: #10b981; border-radius: 50%; margin-left: 8px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }
    </style>
</head>
<body>

    <nav class="fixed top-0 left-0 right-0 bg-white/95 backdrop-blur-sm shadow-sm z-50">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-gradient-to-r from-blue-600 to-purple-600 rounded-lg flex items-center justify-center">
                    <i class="fas fa-headset text-white text-sm"></i>
                </div>
                <span class="font-bold text-xl bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">CJ Support</span>
                <span class="online-dot"></span>
            </div>
            <button id="openChatNav" class="bg-gradient-to-r from-blue-600 to-blue-700 text-white px-5 py-2 rounded-full text-sm font-semibold hover:shadow-lg transition">
                <i class="fas fa-comment-dots mr-1"></i> 联系客服
            </button>
        </div>
    </nav>

    <section class="pt-24 pb-16 px-4 gradient-bg">
        <div class="container mx-auto max-w-5xl text-center">
            <div class="inline-block px-4 py-1 rounded-full bg-white/10 text-white/80 text-sm mb-6 backdrop-blur-sm">🚀 7x24小时在线支持</div>
            <h1 class="text-4xl md:text-6xl font-bold text-white mb-6 leading-tight">智能客服，<br><span class="bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent">实时响应</span></h1>
            <p class="text-lg md:text-xl text-gray-300 mb-8 max-w-2xl mx-auto">有问题随时联系我们，专业客服团队会第一时间为您解答</p>
            <button id="openChatHero" class="bg-white text-gray-900 px-8 py-3 rounded-full font-semibold text-lg hover:shadow-xl transition transform hover:-translate-y-0.5">
                <i class="fas fa-headset mr-2"></i>开始对话
            </button>
        </div>
    </section>

    <section class="py-16 px-4 bg-white">
        <div class="container mx-auto max-w-6xl">
            <div class="text-center mb-12"><h2 class="text-3xl md:text-4xl font-bold text-gray-900 mb-4">为什么选择我们</h2><p class="text-gray-500 max-w-2xl mx-auto">专业、高效、可靠的客户服务体验</p></div>
            <div class="grid md:grid-cols-3 gap-8">
                <div class="group p-6 rounded-2xl bg-white border border-gray-100 hover:shadow-lg transition"><div class="w-12 h-12 bg-blue-50 rounded-xl flex items-center justify-center mb-4"><i class="fas fa-bolt text-2xl text-blue-600"></i></div><h3 class="text-xl font-bold mb-2">极速响应</h3><p class="text-gray-500">平均响应时间小于30秒</p></div>
                <div class="group p-6 rounded-2xl bg-white border border-gray-100 hover:shadow-lg transition"><div class="w-12 h-12 bg-purple-50 rounded-xl flex items-center justify-center mb-4"><i class="fas fa-headset text-2xl text-purple-600"></i></div><h3 class="text-xl font-bold mb-2">专业团队</h3><p class="text-gray-500">经验丰富的客服团队</p></div>
                <div class="group p-6 rounded-2xl bg-white border border-gray-100 hover:shadow-lg transition"><div class="w-12 h-12 bg-green-50 rounded-xl flex items-center justify-center mb-4"><i class="fas fa-database text-2xl text-green-600"></i></div><h3 class="text-xl font-bold mb-2">永久保存</h3><p class="text-gray-500">所有对话记录永久保存</p></div>
            </div>
        </div>
    </section>

    <footer class="bg-gray-900 text-white py-8 text-center text-sm"><p>© 2025 CJ Support. All rights reserved.</p></footer>

    <div class="landing-btn" id="floatingChatBtn"><i class="fas fa-comment-dots text-2xl"></i></div>

    <div class="chat-interface" id="chatInterface">
        <div class="chat-header">
            <button class="back-btn" id="closeChatInterface"><i class="fas fa-arrow-left"></i></button>
            <div class="flex-1"><div style="font-weight: 700;">CJ 智能客服</div><div style="font-size: 11px; opacity: 0.8;">在线 · 通常秒回</div></div>
            <div class="w-2 h-2 bg-green-400 rounded-full"></div>
        </div>
        <div class="messages-container" id="messagesContainer"></div>
        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="messageInput" placeholder="输入消息..." autocomplete="off">
            </div>
            <button class="send-btn" id="sendMessageBtn"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <div id="userInfoModal" class="info-modal">
        <div class="info-card">
            <div class="text-center mb-4">
                <div class="w-16 h-16 bg-gradient-to-r from-blue-500 to-purple-500 rounded-full flex items-center justify-center mx-auto mb-3"><i class="fas fa-user-plus text-white text-2xl"></i></div>
                <h3>填写信息开始对话</h3><p class="text-gray-400 text-sm mt-2">请填写以下信息，客服会尽快联系您</p>
            </div>
            <form id="userInfoForm">
                <div><label class="form-label">姓名 <span class="required-star">*</span></label><input type="text" id="userNameInput" placeholder="请输入您的姓名" required></div>
                <div><label class="form-label">邮箱 <span class="required-star">*</span></label><input type="email" id="userEmailInput" placeholder="example@email.com" required></div>
                <div><label class="form-label">手机号 <span class="required-star">*</span></label><input type="tel" id="userPhoneInput" placeholder="请输入手机号码" required></div>
                <div><label class="form-label">发货地址</label><textarea id="userAddressInput" placeholder="请输入您的发货地址（选填）" rows="2"></textarea></div>
                <button type="submit" class="start-btn">开始对话 <i class="fas fa-arrow-right ml-1"></i></button>
            </form>
        </div>
    </div>
    
    <div id="toastMsg" class="toast-msg"></div>

    <script>
        (function() {
            const SUPABASE_URL = 'https://fflovhydzllmzqbvwktt.supabase.co';
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZmbG92aHlkemxsbXpxYnZ3a3R0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MzY4NjAsImV4cCI6MjA5NzAxMjg2MH0.vMOp1pFEb6G4bj6iyAyR7KU5itGdoAoIZXaNuT6qZm4';
            
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            
            let currentUser = { id: null, name: null, email: null, phone: null, address: null };
            let currentChannel = null;
            
            const userInfoModal = document.getElementById('userInfoModal');
            const userInfoForm = document.getElementById('userInfoForm');
            const chatInterface = document.getElementById('chatInterface');
            const messagesContainer = document.getElementById('messagesContainer');
            const messageInput = document.getElementById('messageInput');
            const sendBtn = document.getElementById('sendMessageBtn');
            const userNameInput = document.getElementById('userNameInput');
            const userEmailInput = document.getElementById('userEmailInput');
            const userPhoneInput = document.getElementById('userPhoneInput');
            const userAddressInput = document.getElementById('userAddressInput');
            const openChatNav = document.getElementById('openChatNav');
            const openChatHero = document.getElementById('openChatHero');
            const floatingChatBtn = document.getElementById('floatingChatBtn');
            const closeChatInterface = document.getElementById('closeChatInterface');
            const toastEl = document.getElementById('toastMsg');
            
            function showToast(msg, isError = false) {
                toastEl.textContent = msg;
                toastEl.style.background = isError ? 'rgba(220,38,38,0.9)' : 'rgba(0,0,0,0.8)';
                toastEl.style.opacity = '1';
                setTimeout(() => { toastEl.style.opacity = '0'; }, 2000);
            }
            
            function escapeHtml(str) {
                if (!str) return '';
                return str.replace(/[&<>]/g, function(m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    return m;
                });
            }
            
            function scrollToBottom() {
                setTimeout(() => {
                    if (messagesContainer) messagesContainer.scrollTop = messagesContainer.scrollHeight;
                }, 100);
            }
            
            function formatDateTime(dateStr) {
                if (!dateStr) return '';
                return new Date(dateStr).toLocaleString('zh-CN');
            }
            
            // 加载消息和回复
            async function loadMessages() {
                if (!currentUser.email) return;
                
                const { data: messages } = await supabase.from('livechat_messages').select('*').eq('email', currentUser.email).order('created_at', { ascending: true });
                if (!messages) return;
                
                const msgIds = messages.map(m => m.id);
                const { data: replies } = await supabase.from('message_replies').select('*').in('message_id', msgIds).order('created_at', { ascending: true });
                
                const repliesByMsg = {};
                if (replies) {
                    for (let r of replies) {
                        if (!repliesByMsg[r.message_id]) repliesByMsg[r.message_id] = [];
                        repliesByMsg[r.message_id].push(r);
                    }
                }
                
                messagesContainer.innerHTML = '';
                
                // 欢迎语
                const welcomeDiv = document.createElement('div');
                welcomeDiv.className = 'message admin';
                welcomeDiv.innerHTML = `<div class="bubble">您好 ${currentUser.name || '用户'}！我是CJ客服助手，请问有什么可以帮助您的？</div><div class="message-time">${new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</div>`;
                messagesContainer.appendChild(welcomeDiv);
                
                for (let msg of messages) {
                    const time = new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    
                    // 用户消息
                    const userMsgDiv = document.createElement('div');
                    userMsgDiv.className = 'message user';
                    userMsgDiv.setAttribute('data-msg-id', msg.id);
                    userMsgDiv.innerHTML = `<div class="bubble">${escapeHtml(msg.message)}</div><div class="message-time">${time}</div>`;
                    messagesContainer.appendChild(userMsgDiv);
                    
                    // 显示所有回复
                    if (repliesByMsg[msg.id] && repliesByMsg[msg.id].length > 0) {
                        const repliesDiv = document.createElement('div');
                        repliesDiv.className = 'replies';
                        for (let reply of repliesByMsg[msg.id]) {
                            const replyTime = formatDateTime(reply.created_at);
                            repliesDiv.innerHTML += `<div class="reply-item"><div class="reply-bubble">${escapeHtml(reply.reply)}<div class="reply-time">${replyTime}</div></div></div>`;
                        }
                        messagesContainer.appendChild(repliesDiv);
                    }
                }
                scrollToBottom();
            }
            
            // 发送消息
            async function sendMessage() {
                const message = messageInput.value.trim();
                if (!message) return;
                
                sendBtn.disabled = true;
                const tempTime = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                
                // 临时显示
                const tempDiv = document.createElement('div');
                tempDiv.className = 'message user';
                tempDiv.innerHTML = `<div class="bubble">${escapeHtml(message)}</div><div class="message-time">${tempTime}</div>`;
                messagesContainer.appendChild(tempDiv);
                scrollToBottom();
                messageInput.value = '';
                
                const { error } = await supabase.from('livechat_messages').insert([{
                    name: currentUser.name,
                    email: currentUser.email,
                    phone: currentUser.phone,
                    address: currentUser.address,
                    message: message,
                    created_at: new Date().toISOString()
                }]);
                
                if (error) {
                    showToast('发送失败', true);
                    tempDiv.remove();
                } else {
                    showToast('已发送');
                }
                sendBtn.disabled = false;
                messageInput.focus();
            }
            
            // 设置实时订阅
            function setupRealtime() {
                if (currentChannel) {
                    supabase.removeChannel(currentChannel);
                }
                
                currentChannel = supabase.channel(`user-${currentUser.email}`)
                    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'livechat_messages', filter: `email=eq.${currentUser.email}` }, () => {
                        console.log('实时: 新消息');
                        loadMessages();
                    })
                    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'message_replies' }, async () => {
                        // 检查回复是否属于当前用户
                        const { data: msgs } = await supabase.from('livechat_messages').select('id').eq('email', currentUser.email);
                        if (msgs && msgs.length > 0) {
                            const msgIds = msgs.map(m => m.id);
                            const { data: newReply } = await supabase.from('message_replies').select('message_id').order('created_at', { ascending: false }).limit(1);
                            if (newReply && newReply[0] && msgIds.includes(newReply[0].message_id)) {
                                console.log('实时: 新回复');
                                showToast('收到客服回复');
                                loadMessages();
                            }
                        }
                    })
                    .subscribe((status) => {
                        console.log('订阅状态:', status);
                    });
            }
            
            // 检查本地存储
            const savedUser = localStorage.getItem('chat_user');
            if (savedUser) {
                try {
                    const user = JSON.parse(savedUser);
                    if (user && user.email && user.name && user.phone) {
                        currentUser = user;
                        userInfoModal.classList.remove('show');
                        loadMessages();
                        setupRealtime();
                    }
                } catch(e) {}
            }
            
            // 提交用户信息
            userInfoForm.onsubmit = function(e) {
                e.preventDefault();
                const name = userNameInput.value.trim();
                const email = userEmailInput.value.trim();
                const phone = userPhoneInput.value.trim();
                const address = userAddressInput.value.trim();
                if (!name || !email || !phone) { showToast('请填写完整信息', true); return; }
                if (!/^\w+([\.-]?\w+)*@\w+([\.-]?\w+)*(\.\w{2,3})+$/.test(email)) { showToast('请输入有效的邮箱地址', true); return; }
                currentUser = { id: Date.now().toString(), name, email, phone, address: address || '' };
                localStorage.setItem('chat_user', JSON.stringify(currentUser));
                userInfoModal.classList.remove('show');
                loadMessages();
                setupRealtime();
                chatInterface.classList.add('open');
                messageInput.focus();
                showToast('欢迎！开始聊天吧');
            };
            
            function openChat() {
                if (!currentUser.name || !currentUser.phone) {
                    userInfoModal.classList.add('show');
                } else {
                    chatInterface.classList.add('open');
                    messageInput.focus();
                    loadMessages();
                }
            }
            
            openChatNav.onclick = openChat;
            openChatHero.onclick = openChat;
            floatingChatBtn.onclick = openChat;
            closeChatInterface.onclick = () => chatInterface.classList.remove('open');
            sendBtn.onclick = sendMessage;
            messageInput.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
            
            console.log('前端已启动 - 实时模式');
        })();
    </script>
</body>
</html>
