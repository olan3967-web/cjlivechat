<!DOCTYPE html>
<html lang="zh-MY">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CJ 限时特卖 | 大马免运 品质好物</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', 'Noto Sans TC', system-ui, sans-serif; background: #ffffff; }
        .brand-orange { color: #FF5F00; }
        .bg-brand-orange { background-color: #FF5F00; }
        .gradient-hero { background: linear-gradient(145deg, #fffaf5 0%, #ffffff 100%); }
        .price-striked { font-size: 0.9rem; color: #a0aec0; text-decoration: line-through; margin-right: 6px; }
        .discount-badge { background: #FF5F00; color: white; font-size: 0.7rem; font-weight: 700; padding: 2px 8px; border-radius: 20px; display: inline-block; }
        .product-card { transition: all 0.25s ease; border: 1px solid #f0f0f0; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.08); border-color: #FF5F00; }
        
        /* 聊天窗 */
        .chat-widget {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 400px;
            max-width: calc(100vw - 32px);
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.25);
            z-index: 10001;
            display: none;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(255,95,0,0.2);
        }
        .chat-widget.open { display: flex; }
        .chat-header { background: #1a1a2e; color: white; padding: 14px 18px; display: flex; justify-content: space-between; align-items: center; }
        .chat-header h4 { font-weight: 600; font-size: 1rem; margin: 0; display: flex; align-items: center; gap: 6px; }
        .close-chat { background: none; border: none; color: white; font-size: 22px; cursor: pointer; }
        .chat-messages-area { height: 400px; overflow-y: auto; padding: 16px; background: #f8f9fc; display: flex; flex-direction: column; gap: 12px; }
        .message { display: flex; max-width: 85%; margin-bottom: 4px; }
        .message.user { align-self: flex-end; justify-content: flex-end; }
        .message.admin { align-self: flex-start; }
        .bubble { padding: 10px 14px; border-radius: 18px; font-size: 13px; word-wrap: break-word; }
        .user .bubble { background: #FF5F00; color: white; border-bottom-right-radius: 4px; }
        .admin .bubble { background: white; color: #1f2937; border: 1px solid #eaeef2; border-bottom-left-radius: 4px; }
        .message-time { font-size: 9px; margin-top: 4px; color: #9ca3af; }
        .user .message-time { text-align: right; }
        
        /* 选项按钮组 */
        .options-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
            margin-bottom: 4px;
        }
        .option-btn {
            background: #f0f0f0;
            border: 1px solid #e0e0e0;
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            color: #333;
        }
        .option-btn:hover {
            background: #FF5F00;
            color: white;
            border-color: #FF5F00;
        }
        
        .input-row { display: flex; gap: 8px; padding: 12px; background: white; border-top: 1px solid #edf2f7; align-items: center; }
        .input-row input { flex: 1; border: 1px solid #e2e8f0; border-radius: 30px; padding: 10px 14px; outline: none; font-size: 13px; }
        .input-row input:focus { border-color: #FF5F00; }
        .send-icon { background: #FF5F00; border: none; width: 40px; height: 40px; border-radius: 50%; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .landing-chat-btn { position: fixed; bottom: 24px; right: 24px; width: 58px; height: 58px; background: #FF5F00; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 6px 16px rgba(255,95,0,0.35); z-index: 10000; }
        
        /* 用户信息弹窗 */
        .info-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 10003; }
        .info-modal.show { display: flex; }
        .info-card { background: white; border-radius: 32px; padding: 28px; width: 440px; max-width: 90%; }
        .info-card input, .info-card textarea { width: 100%; border: 1px solid #e2e8f0; border-radius: 20px; padding: 12px 18px; margin-bottom: 16px; }
        .info-card input:focus { border-color: #FF5F00; outline: none; }
        .start-btn { background: #FF5F00; color: white; width: 100%; padding: 12px; border-radius: 40px; font-weight: 700; border: none; cursor: pointer; }
        .toast-msg { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #1f2937; color: white; padding: 6px 16px; border-radius: 40px; font-size: 12px; opacity: 0; transition: 0.2s; z-index: 10004; pointer-events: none; }
        .flash-sale-bar { background: #FFF1E6; border-radius: 40px; display: inline-flex; align-items: center; gap: 10px; padding: 4px 16px; }
        .timer-number { background: #FF5F00; color: white; border-radius: 8px; padding: 2px 8px; font-weight: 700; }
    </style>
</head>
<body>

    <!-- 导航栏 -->
    <nav class="bg-white/95 backdrop-blur-sm fixed top-0 left-0 w-full z-50 border-b border-gray-100 shadow-sm">
        <div class="container mx-auto px-5 py-3 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-brand-orange rounded-xl flex items-center justify-center"><i class="fas fa-fire text-white text-sm"></i></div>
                <span class="font-extrabold text-xl tracking-tight">CJ<span class="text-brand-orange">·MY</span></span>
            </div>
            <button id="openChatBtn" class="bg-brand-orange text-white px-5 py-2 rounded-full text-sm font-semibold shadow-sm flex items-center gap-1">
                <i class="fas fa-headset"></i> 客服
            </button>
        </div>
    </nav>

    <!-- Hero区域 -->
    <section class="pt-28 pb-12 md:pt-32 gradient-hero">
        <div class="container mx-auto px-5 max-w-6xl">
            <div class="flex flex-col md:flex-row items-center gap-10">
                <div class="flex-1 text-center md:text-left">
                    <div class="flash-sale-bar mb-5"><i class="fas fa-bolt text-brand-orange"></i><span>限时闪购 · 全马包邮</span><div class="flex gap-1"><span id="hour">00</span>:<span id="minute">00</span>:<span id="second">00</span></div></div>
                    <h1 class="text-4xl md:text-5xl font-extrabold">品质好物 <span class="text-brand-orange">直降60%</span></h1>
                    <p class="text-gray-500 text-lg mt-4">马来西亚现货 · 中文客服在线</p>
                    <div class="mt-8"><button id="heroChatBtn" class="bg-brand-orange text-white px-7 py-3 rounded-full font-bold">💬 咨询客服</button></div>
                </div>
                <div class="flex-1"><div class="bg-white rounded-3xl shadow-xl p-3"><img src="https://placehold.co/600x480/fef3e8/FF5F00?text=Main+Product" class="rounded-2xl w-full"><div class="absolute mt-2 ml-2 bg-brand-orange text-white px-3 py-1 rounded-full text-sm">热卖中</div></div></div>
            </div>
        </div>
    </section>

    <!-- 商品列表 -->
    <section class="py-16 bg-white">
        <div class="container mx-auto px-5 max-w-6xl">
            <div class="text-center mb-10"><h2 class="text-3xl font-bold">🔥 人气爆款 <span class="text-brand-orange">限时折扣</span></h2></div>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-7">
                <div class="product-card rounded-2xl p-5"><img src="https://placehold.co/400x300/ffffff/FF5F00?text=Smart+Watch" class="rounded-lg w-full"><h3 class="font-bold mt-2">极光智能手表</h3><div class="text-2xl font-bold text-brand-orange">RM 169</div><button class="w-full mt-2 border border-brand-orange text-brand-orange py-2 rounded-full">购买</button></div>
                <div class="product-card rounded-2xl p-5"><img src="https://placehold.co/400x300/ffffff/FF5F00?text=ANC+Headphones" class="rounded-lg w-full"><h3 class="font-bold mt-2">ANC降噪耳机</h3><div class="text-2xl font-bold text-brand-orange">RM 229</div><button class="w-full mt-2 border border-brand-orange text-brand-orange py-2 rounded-full">购买</button></div>
                <div class="product-card rounded-2xl p-5"><img src="https://placehold.co/400x300/ffffff/FF5F00?text=Powerbank" class="rounded-lg w-full"><h3 class="font-bold mt-2">磁吸充电宝</h3><div class="text-2xl font-bold text-brand-orange">RM 99</div><button class="w-full mt-2 border border-brand-orange text-brand-orange py-2 rounded-full">购买</button></div>
            </div>
        </div>
    </section>

    <!-- 聊天浮窗 -->
    <div class="landing-chat-btn" id="floatingChatBtn"><i class="fas fa-comment-dots text-2xl"></i></div>

    <!-- 聊天窗口 -->
    <div id="chatWidget" class="chat-widget">
        <div class="chat-header"><h4><i class="fas fa-headset"></i> CJ 客服</h4><button class="close-chat" id="closeWidgetBtn">&times;</button></div>
        <div class="chat-messages-area" id="chatMessagesArea"></div>
        <div class="input-row"><input type="text" id="msgInput" placeholder="输入消息..." autocomplete="off"><button class="send-icon" id="sendBtn"><i class="fas fa-paper-plane"></i></button></div>
    </div>

    <!-- 用户信息弹窗 -->
    <div id="userInfoModal" class="info-modal">
        <div class="info-card text-center">
            <i class="fas fa-user-circle text-5xl text-brand-orange mb-3"></i>
            <h3 class="text-2xl font-bold">联系客服</h3>
            <form id="userInfoForm">
                <input type="text" id="userName" placeholder="您的称呼" required>
                <input type="email" id="userEmail" placeholder="电子邮箱" required>
                <input type="tel" id="userPhone" placeholder="手机号" required>
                <button type="submit" class="start-btn">开始对话</button>
            </form>
        </div>
    </div>
    <div id="toastMsg" class="toast-msg"></div>

    <script>
        (function() {
            // ========== 聊天选项配置（可自定义，后台可修改）==========
            const CHAT_OPTIONS = {
                // 语言选项（首次显示）
                language: {
                    title: "🌏 请选择语言 / Please select language",
                    options: [
                        { text: "English", value: "en", reply: "I prefer English" },
                        { text: "Bahasa Melayu", value: "ms", reply: "Saya pilih Bahasa Melayu" },
                        { text: "中文", value: "zh", reply: "我选择中文" }
                    ]
                },
                // 付款方式选项（语言选择后显示）
                payment: {
                    title: "💳 请选择付款方式 / Select payment method",
                    options: [
                        { text: "Touch n Go / GrabPay", value: "tng", reply: "我要用 Touch n Go / GrabPay 付款" },
                        { text: "银行转账 / FPX", value: "bank", reply: "我要用银行转账 / FPX" },
                        { text: "信用卡 / Credit Card", value: "card", reply: "我要用信用卡付款" }
                    ]
                },
                // 常见问题选项
                faq: {
                    title: "❓ 常见问题 / FAQ",
                    options: [
                        { text: "📦 物流查询", value: "tracking", reply: "我想查询物流信息" },
                        { text: "🔄 退换货政策", value: "return", reply: "请问退换货政策是什么？" },
                        { text: "🎁 优惠活动", value: "promo", reply: "有什么优惠活动？" }
                    ]
                }
            };
            
            // 选项流程状态
            let optionStep = 'language'; // language -> payment -> faq (可循环)
            let userLanguage = 'zh'; // 默认中文
            
            const SUPABASE_URL = 'https://fflovhydzllmzqbvwktt.supabase.co';
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZmbG92aHlkemxsbXpxYnZ3a3R0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MzY4NjAsImV4cCI6MjA5NzAxMjg2MH0.vMOp1pFEb6G4bj6iyAyR7KU5itGdoAoIZXaNuT6qZm4';
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            
            let currentUser = { id: null, name: null, email: null, phone: null };
            let realtimeChannel = null;
            
            // DOM
            const userInfoModal = document.getElementById('userInfoModal');
            const chatWidget = document.getElementById('chatWidget');
            const messagesArea = document.getElementById('chatMessagesArea');
            const msgInput = document.getElementById('msgInput');
            const sendBtn = document.getElementById('sendBtn');
            const openBtn = document.getElementById('openChatBtn');
            const heroBtn = document.getElementById('heroChatBtn');
            const floatingBtn = document.getElementById('floatingChatBtn');
            const closeWidget = document.getElementById('closeWidgetBtn');
            const toastEl = document.getElementById('toastMsg');
            
            function showToast(msg) { toastEl.textContent = msg; toastEl.style.opacity = '1'; setTimeout(() => toastEl.style.opacity = '0', 2000); }
            function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
            function scrollBottom() { setTimeout(() => { if(messagesArea) messagesArea.scrollTop = messagesArea.scrollHeight; }, 100); }
            function formatTime(d) { return new Date(d).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); }
            
            // 添加消息到界面
            function addMessage(text, isUser, time) {
                const div = document.createElement('div');
                div.className = `message ${isUser ? 'user' : 'admin'}`;
                div.innerHTML = `<div class="bubble">${escapeHtml(text)}</div><div class="message-time">${time || new Date().toLocaleTimeString()}</div>`;
                messagesArea.appendChild(div);
                scrollBottom();
            }
            
            // 添加选项按钮组
            function addOptionsButtons(optionsConfig) {
                const container = document.createElement('div');
                container.className = 'options-container';
                for (let opt of optionsConfig.options) {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.textContent = opt.text;
                    btn.onclick = () => {
                        // 用户点击选项后，自动发送对应消息
                        addMessage(opt.reply, true, new Date().toLocaleTimeString());
                        saveUserMessage(opt.reply);
                        // 根据选择的语言更新后续消息语言
                        if (optionsConfig === CHAT_OPTIONS.language) {
                            if (opt.value === 'en') userLanguage = 'en';
                            else if (opt.value === 'ms') userLanguage = 'ms';
                            else userLanguage = 'zh';
                            // 语言选择完成后，显示付款方式选项
                            setTimeout(() => {
                                addAdminMessage(CHAT_OPTIONS.payment.title);
                                addOptionsButtons(CHAT_OPTIONS.payment);
                                optionStep = 'payment';
                            }, 500);
                        } else if (optionsConfig === CHAT_OPTIONS.payment) {
                            // 付款方式选择完成后，显示常见问题
                            setTimeout(() => {
                                addAdminMessage(CHAT_OPTIONS.faq.title);
                                addOptionsButtons(CHAT_OPTIONS.faq);
                                optionStep = 'faq';
                            }, 500);
                        } else if (optionsConfig === CHAT_OPTIONS.faq) {
                            // 常见问题选择后，客服人工回复
                            setTimeout(() => {
                                addAdminMessage("谢谢您的咨询！我们的客服会尽快回复您。Thank you! / Terima kasih!");
                            }, 500);
                        }
                    };
                    container.appendChild(btn);
                }
                messagesArea.appendChild(container);
                scrollBottom();
            }
            
            function addAdminMessage(text) {
                const div = document.createElement('div');
                div.className = 'message admin';
                div.innerHTML = `<div class="bubble">${escapeHtml(text)}</div><div class="message-time">${new Date().toLocaleTimeString()}</div>`;
                messagesArea.appendChild(div);
                scrollBottom();
            }
            
            async function saveUserMessage(message) {
                if (!currentUser.email) return;
                const { error } = await supabase.from('livechat_messages').insert([{
                    name: currentUser.name, email: currentUser.email, phone: currentUser.phone,
                    message: message, created_at: new Date().toISOString()
                }]);
                if (error) console.error('保存失败', error);
            }
            
            async function loadHistory() {
                if (!currentUser.email) return;
                const { data: messages } = await supabase.from('livechat_messages').select('*').eq('email', currentUser.email).order('created_at', { ascending: true });
                if (!messages) return;
                const msgIds = messages.map(m => m.id);
                const { data: replies } = await supabase.from('message_replies').select('*').in('message_id', msgIds);
                const repliesByMsg = {};
                if (replies) for (let r of replies) { if (!repliesByMsg[r.message_id]) repliesByMsg[r.message_id] = []; repliesByMsg[r.message_id].push(r); }
                
                messagesArea.innerHTML = '';
                for (let msg of messages) {
                    addMessage(msg.message, true, formatTime(msg.created_at));
                    if (repliesByMsg[msg.id]) {
                        for (let r of repliesByMsg[msg.id]) {
                            addMessage(r.reply, false, new Date(r.created_at).toLocaleTimeString());
                        }
                    }
                }
                // 如果历史记录为空，显示欢迎语和选项
                if (messages.length === 0) {
                    addAdminMessage("您好！我是CJ智能客服，请选择您的语言 / Please select your language:");
                    addOptionsButtons(CHAT_OPTIONS.language);
                }
                scrollBottom();
            }
            
            async function sendManualMessage() {
                const msg = msgInput.value.trim();
                if (!msg) return;
                addMessage(msg, true, new Date().toLocaleTimeString());
                await saveUserMessage(msg);
                msgInput.value = '';
                // 转发到 Supabase，后台可以看到
            }
            
            function setupRealtime() {
                if (realtimeChannel) supabase.removeChannel(realtimeChannel);
                realtimeChannel = supabase.channel(`user-${currentUser.email}`)
                    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'message_replies', filter: `message_id_in` }, async() => {
                        const { data: msgs } = await supabase.from('livechat_messages').select('id').eq('email', currentUser.email);
                        if (msgs && msgs.length) {
                            const msgIds = msgs.map(m => m.id);
                            const { data: newReplies } = await supabase.from('message_replies').select('*').in('message_id', msgIds).order('created_at', { ascending: false }).limit(1);
                            if (newReplies && newReplies[0]) {
                                addMessage(newReplies[0].reply, false, new Date().toLocaleTimeString());
                            }
                        }
                    }).subscribe();
            }
            
            // 用户信息提交
            const savedUser = localStorage.getItem('chat_user');
            if (savedUser) {
                try { currentUser = JSON.parse(savedUser); } catch(e) {}
            }
            
            document.getElementById('userInfoForm').onsubmit = async (e) => {
                e.preventDefault();
                const name = document.getElementById('userName').value.trim();
                const email = document.getElementById('userEmail').value.trim();
                const phone = document.getElementById('userPhone').value.trim();
                if (!name || !email || !phone) { showToast('请填写完整信息'); return; }
                currentUser = { id: Date.now().toString(), name, email, phone };
                localStorage.setItem('chat_user', JSON.stringify(currentUser));
                userInfoModal.classList.remove('show');
                chatWidget.classList.add('open');
                setupRealtime();
                await loadHistory();
                msgInput.focus();
            };
            
            function openChat() {
                if (!currentUser.name) {
                    userInfoModal.classList.add('show');
                } else {
                    chatWidget.classList.add('open');
                    loadHistory();
                    msgInput.focus();
                }
            }
            
            openBtn.onclick = openChat;
            heroBtn.onclick = openChat;
            floatingBtn.onclick = openChat;
            closeWidget.onclick = () => chatWidget.classList.remove('open');
            sendBtn.onclick = sendManualMessage;
            msgInput.onkeypress = (e) => { if (e.key === 'Enter') sendManualMessage(); };
            
            // 倒计时
            let target = new Date(); target.setHours(target.getHours() + 2);
            function updateTimer() {
                let diff = Math.max(0, Math.floor((target - new Date())/1000));
                document.getElementById('hour').innerText = String(Math.floor(diff/3600)).padStart(2,'0');
                document.getElementById('minute').innerText = String(Math.floor((diff%3600)/60)).padStart(2,'0');
                document.getElementById('second').innerText = String(diff%60).padStart(2,'0');
            }
            setInterval(updateTimer, 1000); updateTimer();
        })();
    </script>
</body>
</html>
