<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CJ客服后台管理系统 | 实时对话</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #f3f4f6; }
        
        .conversation-item {
            transition: all 0.2s;
            cursor: pointer;
            border-bottom: 1px solid #e5e7eb;
        }
        .conversation-item:hover { background: #f9fafb; }
        .delete-btn { opacity: 0; transition: opacity 0.2s; }
        .conversation-item:hover .delete-btn { opacity: 1; }
        .message-bubble { 
            background: #e0e7ff; 
            padding: 8px 12px; 
            border-radius: 12px; 
            display: inline-block; 
            max-width: 100%;
            font-size: 13px;
        }
        .reply-bubble { 
            background: #d1fae5; 
            padding: 8px 12px; 
            border-radius: 12px; 
            display: inline-block; 
            max-width: 100%; 
            margin-top: 4px;
            font-size: 13px;
        }
        .toast-msg { 
            position: fixed; 
            bottom: 20px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: rgba(0,0,0,0.8); 
            color: white; 
            padding: 10px 20px; 
            border-radius: 40px; 
            font-size: 13px; 
            z-index: 10002; 
            pointer-events: none; 
            opacity: 0; 
            transition: opacity 0.2s;
            backdrop-filter: blur(8px);
        }
        .has-unread { 
            animation: pulse 0.5s; 
            background: #fef2f2; 
        }
        @keyframes pulse { 
            0% { background: #fee2e2; } 
            100% { background: transparent; } 
        }
        .status-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
        }
        .status-online { background: #10b981; color: white; }
        .status-offline { background: #9ca3af; color: white; }
        
        /* 滚动条 */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        
        .user-info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            background: #f8fafc;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 12px;
        }
        .user-info-item {
            font-size: 12px;
        }
        .user-info-label {
            font-weight: 600;
            color: #4b5563;
            margin-right: 6px;
        }
        .user-info-value {
            color: #1f2937;
        }
    </style>
</head>
<body>

    <!-- 导航栏 -->
    <nav class="bg-gradient-to-r from-indigo-900 to-purple-900 text-white px-6 py-4 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-white/20 rounded-lg flex items-center justify-center">
                    <i class="fas fa-headset text-white text-sm"></i>
                </div>
                <div>
                    <span class="font-bold text-xl">CJ 客服后台</span>
                    <span class="text-xs ml-2 text-white/70">实时管理系统</span>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <div class="flex items-center gap-2">
                    <div class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div>
                    <span class="text-sm">实时连接中</span>
                </div>
                <div class="w-8 h-8 bg-white/20 rounded-full flex items-center justify-center">
                    <i class="fas fa-user-shield text-sm"></i>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-4 py-6">
        <!-- 统计卡片 -->
        <div class="grid md:grid-cols-4 gap-4 mb-6">
            <div class="bg-white rounded-xl shadow-sm p-4 border-l-4 border-blue-500">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">总消息数</p>
                        <p id="totalCount" class="text-2xl font-bold text-gray-800">0</p>
                    </div>
                    <i class="fas fa-envelope text-3xl text-blue-400"></i>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-sm p-4 border-l-4 border-yellow-500">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">待回复</p>
                        <p id="unreadCount" class="text-2xl font-bold text-red-600">0</p>
                    </div>
                    <i class="fas fa-clock text-3xl text-yellow-400"></i>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-sm p-4 border-l-4 border-green-500">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">已回复</p>
                        <p id="repliedCount" class="text-2xl font-bold text-green-600">0</p>
                    </div>
                    <i class="fas fa-check-circle text-3xl text-green-400"></i>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-sm p-4 border-l-4 border-purple-500">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">对话用户</p>
                        <p id="userCount" class="text-2xl font-bold text-purple-600">0</p>
                    </div>
                    <i class="fas fa-users text-3xl text-purple-400"></i>
                </div>
            </div>
        </div>

        <!-- 对话列表 -->
        <div class="bg-white rounded-xl shadow-sm overflow-hidden">
            <div class="px-6 py-4 border-b flex justify-between items-center bg-gray-50">
                <div class="flex items-center gap-3">
                    <i class="fas fa-comments text-indigo-500"></i>
                    <h2 class="font-bold text-lg">对话列表（按用户分组）</h2>
                    <span class="text-xs text-gray-400 bg-gray-200 px-2 py-1 rounded-full">实时更新</span>
                </div>
                <button id="refreshBtn" class="bg-indigo-500 text-white px-3 py-1.5 rounded-lg text-sm hover:bg-indigo-600 transition flex items-center gap-1">
                    <i class="fas fa-sync-alt"></i> 手动刷新
                </button>
            </div>
            <div id="conversationsContainer" class="divide-y">
                <div class="text-center py-12 text-gray-400">
                    <i class="fas fa-spinner fa-spin text-2xl mb-2"></i>
                    <p>加载对话中...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 回复弹窗 -->
    <div id="replyModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden items-center justify-center z-50">
        <div class="bg-white rounded-2xl w-[550px] max-w-[90%] max-h-[85vh] overflow-hidden shadow-2xl animate-fade-in">
            <div class="bg-gradient-to-r from-indigo-600 to-purple-600 text-white px-5 py-4 flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <i class="fas fa-reply"></i>
                    <h3 class="font-bold">回复用户</h3>
                </div>
                <button id="closeModalBtn" class="text-white/80 hover:text-white text-2xl">&times;</button>
            </div>
            <div class="p-5 overflow-auto" style="max-height: calc(85vh - 120px);">
                <!-- 用户信息 -->
                <div id="userInfoPanel" class="user-info-grid"></div>
                <!-- 对话预览 -->
                <div class="bg-gray-50 rounded-xl p-4 mb-4">
                    <div class="text-xs text-gray-400 mb-2 flex items-center gap-1">
                        <i class="fas fa-history"></i> 对话记录
                    </div>
                    <div id="conversationPreview" class="space-y-3 max-h-80 overflow-auto"></div>
                </div>
                <!-- 回复输入 -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">回复内容</label>
                    <textarea id="replyContent" rows="4" class="w-full border border-gray-300 rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent" placeholder="输入回复内容..."></textarea>
                </div>
            </div>
            <div class="px-5 py-4 border-t bg-gray-50 flex justify-end gap-3">
                <button id="cancelModalBtn" class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-100 transition">取消</button>
                <button id="submitReplyBtn" class="px-5 py-2 bg-gradient-to-r from-indigo-600 to-purple-600 text-white rounded-lg hover:opacity-90 transition flex items-center gap-2">
                    <i class="fas fa-paper-plane"></i> 发送回复
                </button>
            </div>
        </div>
    </div>
    
    <!-- 删除确认弹窗 -->
    <div id="deleteConfirmModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden items-center justify-center z-50">
        <div class="bg-white rounded-2xl w-96 p-6 shadow-2xl">
            <div class="text-center mb-4">
                <div class="w-12 h-12 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-3">
                    <i class="fas fa-trash-alt text-red-500 text-xl"></i>
                </div>
                <h3 class="font-bold text-lg">确认删除</h3>
                <p class="text-gray-500 text-sm mt-2">确定要删除该用户的所有对话记录吗？<br>此操作不可恢复。</p>
            </div>
            <div class="flex justify-end gap-3">
                <button id="cancelDeleteBtn" class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-100 transition">取消</button>
                <button id="confirmDeleteBtn" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition">确认删除</button>
            </div>
        </div>
    </div>
    
    <div id="toastMsg" class="toast-msg"></div>

    <script>
        (function() {
            const SUPABASE_URL = 'https://fflovhydzllmzqbvwktt.supabase.co';
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZmbG92aHlkemxsbXpxYnZ3a3R0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MzY4NjAsImV4cCI6MjA5NzAxMjg2MH0.vMOp1pFEb6G4bj6iyAyR7KU5itGdoAoIZXaNuT6qZm4';
            
            const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            const TABLE_NAME = 'livechat_messages';
            let currentConversation = null;
            let currentUserEmail = null;
            let pendingDeleteEmail = null;
            let realtimeChannel = null;
            
            const toastEl = document.getElementById('toastMsg');
            
            function showToast(msg, isError = false) {
                toastEl.textContent = msg;
                toastEl.style.background = isError ? 'rgba(220,38,38,0.9)' : 'rgba(0,0,0,0.8)';
                toastEl.style.opacity = '1';
                setTimeout(() => { toastEl.style.opacity = '0'; }, 2500);
            }
            
            function escapeHtml(str) { 
                if (!str) return ''; 
                return str.replace(/[&<>]/g, (m) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); 
            }
            
            function formatDate(dateStr) {
                if (!dateStr) return '';
                const date = new Date(dateStr);
                return date.toLocaleString('zh-CN', { hour12: false });
            }
            
            async function renderConversations() {
                const { data: messages, error } = await _supabase
                    .from(TABLE_NAME)
                    .select('*')
                    .order('created_at', { ascending: true });
                
                if (error) { 
                    console.error(error); 
                    document.getElementById('conversationsContainer').innerHTML = '<div class="text-center py-8 text-red-400">加载失败</div>';
                    return; 
                }
                
                // 按邮箱分组
                const groups = {};
                for (let msg of messages || []) {
                    if (!groups[msg.email]) {
                        groups[msg.email] = { 
                            name: msg.name, 
                            email: msg.email, 
                            phone: msg.phone || '未填写',
                            address: msg.address || '未填写',
                            messages: [] 
                        };
                    }
                    groups[msg.email].messages.push(msg);
                }
                
                const totalUsers = Object.keys(groups).length;
                document.getElementById('userCount').innerText = totalUsers;
                const totalMessages = messages?.length || 0;
                const unreadCount = (messages || []).filter(m => !m.reply || m.reply === '').length;
                document.getElementById('totalCount').innerText = totalMessages;
                document.getElementById('unreadCount').innerText = unreadCount;
                document.getElementById('repliedCount').innerText = totalMessages - unreadCount;
                
                const container = document.getElementById('conversationsContainer');
                if (Object.keys(groups).length === 0) { 
                    container.innerHTML = '<div class="text-center py-12 text-gray-400"><i class="fas fa-inbox text-4xl mb-2"></i><p>暂无对话</p></div>'; 
                    return; 
                }
                
                let html = '';
                for (let email in groups) {
                    const group = groups[email];
                    const lastMsg = group.messages[group.messages.length - 1];
                    const hasUnread = group.messages.some(m => !m.reply || m.reply === '');
                    const lastTime = formatDate(lastMsg.created_at);
                    html += `
                        <div class="conversation-item p-4 flex justify-between items-center ${hasUnread ? 'has-unread' : ''}" data-email="${escapeHtml(email)}">
                            <div class="flex-1 cursor-pointer" onclick="window.openConversation('${escapeHtml(email)}')">
                                <div class="flex items-center gap-3 mb-1">
                                    <div class="w-8 h-8 bg-gradient-to-r from-indigo-500 to-purple-500 rounded-full flex items-center justify-center text-white text-xs font-bold">
                                        ${escapeHtml(group.name.charAt(0).toUpperCase())}
                                    </div>
                                    <div>
                                        <div class="font-semibold text-gray-800">${escapeHtml(group.name)}</div>
                                        <div class="text-xs text-gray-400">${escapeHtml(email)}</div>
                                    </div>
                                </div>
                                <div class="text-sm text-gray-500 mt-1 truncate max-w-md">
                                    <i class="fas fa-comment-dots text-gray-300 mr-1 text-xs"></i>
                                    ${escapeHtml(lastMsg.message.substring(0, 50))}
                                </div>
                            </div>
                            <div class="text-right flex items-center gap-3">
                                <div>
                                    <div class="text-xs text-gray-400">${lastTime}</div>
                                    ${hasUnread ? '<div class="mt-1 bg-red-500 text-white text-xs rounded-full px-2 py-0.5">待回复</div>' : '<div class="mt-1 text-green-500 text-xs">已回复</div>'}
                                </div>
                                <button class="delete-btn text-red-400 hover:text-red-600 p-2 transition" onclick="event.stopPropagation(); window.confirmDeleteUser('${escapeHtml(email)}')">
                                    <i class="fas fa-trash-alt"></i>
                                </button>
                            </div>
                        </div>
                    `;
                }
                container.innerHTML = html;
            }
            
            window.openConversation = async function(email) {
                currentUserEmail = email;
                const { data } = await _supabase
                    .from(TABLE_NAME)
                    .select('*')
                    .eq('email', email)
                    .order('created_at', { ascending: true });
                
                if (data && data.length > 0) {
                    currentConversation = data;
                    const userInfo = data[0];
                    
                    // 显示用户信息
                    const userInfoHtml = `
                        <div class="user-info-item">
                            <span class="user-info-label"><i class="fas fa-user"></i> 姓名：</span>
                            <span class="user-info-value">${escapeHtml(userInfo.name)}</span>
                        </div>
                        <div class="user-info-item">
                            <span class="user-info-label"><i class="fas fa-envelope"></i> 邮箱：</span>
                            <span class="user-info-value">${escapeHtml(userInfo.email)}</span>
                        </div>
                        <div class="user-info-item">
                            <span class="user-info-label"><i class="fas fa-phone"></i> 手机号：</span>
                            <span class="user-info-value">${escapeHtml(userInfo.phone || '未填写')}</span>
                        </div>
                        <div class="user-info-item">
                            <span class="user-info-label"><i class="fas fa-map-marker-alt"></i> 地址：</span>
                            <span class="user-info-value">${escapeHtml(userInfo.address || '未填写')}</span>
                        </div>
                    `;
                    document.getElementById('userInfoPanel').innerHTML = userInfoHtml;
                    
                    // 显示对话记录
                    let previewHtml = '';
                    for (let msg of data) {
                        const time = formatDate(msg.created_at);
                        previewHtml += `
                            <div class="mb-3">
                                <div class="text-xs text-gray-400 mb-1">${time}</div>
                                <div class="message-bubble max-w-full">
                                    <i class="fas fa-user-circle text-indigo-400 mr-1 text-xs"></i>
                                    ${escapeHtml(msg.message)}
                                </div>
                        `;
                        if (msg.reply && msg.reply.trim()) {
                            previewHtml += `
                                <div class="reply-bubble max-w-full mt-1">
                                    <i class="fas fa-headset text-green-500 mr-1 text-xs"></i>
                                    ${escapeHtml(msg.reply)}
                                </div>
                            `;
                        } else {
                            previewHtml += `<div class="text-xs text-gray-400 mt-1"><i class="fas fa-clock"></i> 等待回复...</div>`;
                        }
                        previewHtml += `</div>`;
                    }
                    document.getElementById('conversationPreview').innerHTML = previewHtml;
                    document.getElementById('replyContent').value = '';
                    document.getElementById('replyModal').classList.remove('hidden');
                    document.getElementById('replyModal').classList.add('flex');
                }
            };
            
            window.confirmDeleteUser = function(email) {
                pendingDeleteEmail = email;
                document.getElementById('deleteConfirmModal').classList.remove('hidden');
                document.getElementById('deleteConfirmModal').classList.add('flex');
            };
            
            async function deleteUserConversations() {
                if (!pendingDeleteEmail) return;
                const { error } = await _supabase.from(TABLE_NAME).delete().eq('email', pendingDeleteEmail);
                if (error) { 
                    showToast('删除失败: ' + error.message, true); 
                } else { 
                    showToast('已删除该用户所有对话'); 
                    renderConversations();
                    // 如果当前打开的弹窗是被删除的用户，关闭弹窗
                    if (currentUserEmail === pendingDeleteEmail) {
                        document.getElementById('replyModal').classList.add('hidden');
                        document.getElementById('replyModal').classList.remove('flex');
                    }
                }
                document.getElementById('deleteConfirmModal').classList.add('hidden');
                document.getElementById('deleteConfirmModal').classList.remove('flex');
                pendingDeleteEmail = null;
            }
            
            async function submitReply() {
                const reply = document.getElementById('replyContent').value.trim();
                if (!reply) { 
                    showToast('请输入回复内容', true); 
                    return; 
                }
                const unreadMessages = currentConversation.filter(m => !m.reply || m.reply === '');
                if (unreadMessages.length === 0) { 
                    showToast('所有消息都已回复', true); 
                    return; 
                }
                const targetMsg = unreadMessages[unreadMessages.length - 1];
                const { error } = await _supabase
                    .from(TABLE_NAME)
                    .update({ reply: reply, is_replied: true })
                    .eq('id', targetMsg.id);
                
                if (error) { 
                    showToast('回复失败: ' + error.message, true); 
                } else {
                    showToast('回复成功！用户端会实时显示');
                    document.getElementById('replyModal').classList.add('hidden');
                    document.getElementById('replyModal').classList.remove('flex');
                    renderConversations();
                }
            }
            
            function setupRealtime() {
                if (realtimeChannel) {
                    _supabase.removeChannel(realtimeChannel);
                }
                realtimeChannel = _supabase
                    .channel('admin-realtime')
                    .on('postgres_changes', { event: '*', schema: 'public', table: TABLE_NAME }, (payload) => {
                        console.log('后台收到实时变更:', payload.eventType);
                        renderConversations();
                    })
                    .subscribe((status) => {
                        console.log('后台实时订阅状态:', status);
                        const statusDot = document.querySelector('.w-2.h-2.bg-green-400');
                        if (status === 'SUBSCRIBED') {
                            if (statusDot) statusDot.className = 'w-2 h-2 bg-green-400 rounded-full animate-pulse';
                        } else {
                            if (statusDot) statusDot.className = 'w-2 h-2 bg-yellow-400 rounded-full';
                        }
                    });
            }
            
            // 绑定事件
            document.getElementById('refreshBtn').onclick = renderConversations;
            document.getElementById('closeModalBtn').onclick = () => { 
                document.getElementById('replyModal').classList.add('hidden'); 
                document.getElementById('replyModal').classList.remove('flex'); 
            };
            document.getElementById('cancelModalBtn').onclick = () => { 
                document.getElementById('replyModal').classList.add('hidden'); 
                document.getElementById('replyModal').classList.remove('flex'); 
            };
            document.getElementById('submitReplyBtn').onclick = submitReply;
            document.getElementById('cancelDeleteBtn').onclick = () => { 
                document.getElementById('deleteConfirmModal').classList.add('hidden'); 
                document.getElementById('deleteConfirmModal').classList.remove('flex'); 
                pendingDeleteEmail = null; 
            };
            document.getElementById('confirmDeleteBtn').onclick = deleteUserConversations;
            
            // 初始化
            renderConversations();
            setupRealtime();
        })();
    </script>
</body>
</html>
