<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CJ客服后台 | 实时对话</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #f3f4f6; }
        
        .user-item { cursor: pointer; border-bottom: 1px solid #e5e7eb; padding: 16px; transition: background 0.2s; display: flex; justify-content: space-between; align-items: center; }
        .user-item:hover { background: #f9fafb; }
        .delete-btn { opacity: 0; transition: opacity 0.2s; color: #ef4444; background: none; border: none; cursor: pointer; font-size: 14px; }
        .user-item:hover .delete-btn { opacity: 1; }
        .has-unread { background: #fef2f2; }
        
        .chat-message { margin-bottom: 20px; display: flex; }
        .chat-message.user { justify-content: flex-start; }
        .chat-message.admin { justify-content: flex-end; }
        .bubble { max-width: 70%; padding: 10px 14px; border-radius: 18px; font-size: 13px; }
        .bubble.user { background: #e5e7eb; color: #1f2937; }
        .bubble.admin { background: #2563eb; color: white; }
        .msg-time { font-size: 10px; margin-top: 4px; opacity: 0.7; }
        
        .replies { margin-top: 8px; margin-left: 20px; border-left: 2px solid #e5e7eb; padding-left: 12px; }
        .reply-item { margin-top: 8px; display: flex; justify-content: flex-end; }
        .reply-bubble { background: #2563eb; color: white; padding: 8px 12px; border-radius: 18px; font-size: 12px; max-width: 80%; }
        .reply-time { font-size: 9px; opacity: 0.7; margin-top: 2px; text-align: right; }
        
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal.show { display: flex; }
        .modal-content { background: white; border-radius: 24px; width: 500px; max-width: 90%; height: 70vh; display: flex; flex-direction: column; overflow: hidden; }
        .modal-header { background: #4f46e5; color: white; padding: 16px 20px; display: flex; justify-content: space-between; }
        .modal-body { flex: 1; overflow-y: auto; padding: 16px; background: #f8fafc; }
        .modal-footer { padding: 12px 16px; background: white; border-top: 1px solid #e5e7eb; display: flex; gap: 8px; }
        .modal-footer input { flex: 1; padding: 10px 16px; border: 1px solid #e5e7eb; border-radius: 24px; outline: none; }
        .modal-footer button { background: #4f46e5; color: white; border: none; padding: 10px 20px; border-radius: 24px; cursor: pointer; }
        .close-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }
        
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 8px 16px; border-radius: 20px; font-size: 12px; opacity: 0; transition: opacity 0.2s; z-index: 1001; }
        .delete-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1002; }
        .delete-modal.show { display: flex; }
        .delete-box { background: white; border-radius: 16px; padding: 24px; width: 300px; text-align: center; }
        .delete-box button { margin: 8px; padding: 8px 20px; border: none; border-radius: 8px; cursor: pointer; }
        .confirm-delete { background: #ef4444; color: white; }
        .cancel-delete { background: #e5e7eb; }
        
        .stat-card { background: white; border-radius: 12px; padding: 16px; }
        .stat-number { font-size: 28px; font-weight: bold; }
        .online-dot { display: inline-block; width: 8px; height: 8px; background: #10b981; border-radius: 50%; margin-left: 8px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }
    </style>
</head>
<body>

    <div class="bg-indigo-800 text-white px-6 py-4">
        <div class="container mx-auto flex justify-between items-center">
            <div><span class="font-bold text-xl">CJ 客服后台</span><span class="online-dot"></span></div>
            <span class="text-sm">实时模式 · 直接输入 Enter 发送</span>
        </div>
    </div>

    <div class="container mx-auto px-4 py-6">
        <div class="grid grid-cols-4 gap-4 mb-6">
            <div class="stat-card"><div class="text-gray-500 text-sm">总消息</div><div class="stat-number" id="totalCount">0</div></div>
            <div class="stat-card"><div class="text-gray-500 text-sm">待回复</div><div class="stat-number text-red-600" id="unreadCount">0</div></div>
            <div class="stat-card"><div class="text-gray-500 text-sm">已回复</div><div class="stat-number text-green-600" id="repliedCount">0</div></div>
            <div class="stat-card"><div class="text-gray-500 text-sm">用户数</div><div class="stat-number" id="userCount">0</div></div>
        </div>

        <div class="bg-white rounded-lg overflow-hidden shadow">
            <div class="px-6 py-4 border-b flex justify-between items-center bg-gray-50">
                <h2 class="font-bold">用户列表 <span class="text-xs text-green-600 ml-2">● 实时更新</span></h2>
                <button id="refreshBtn" class="bg-indigo-500 text-white px-3 py-1 rounded text-sm">手动刷新</button>
            </div>
            <div id="userList"></div>
        </div>
    </div>

    <!-- 聊天窗口 -->
    <div id="chatModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div><span id="chatUserName"></span> <span id="chatUserEmail" class="text-sm opacity-80"></span></div>
                <button class="close-btn" id="closeChatBtn">&times;</button>
            </div>
            <div class="modal-body" id="chatMessages"></div>
            <div class="modal-footer">
                <input type="text" id="msgInput" placeholder="输入回复... 按 Enter 发送" autocomplete="off">
                <button id="sendBtn">发送</button>
            </div>
        </div>
    </div>

    <!-- 删除确认 -->
    <div id="deleteModal" class="delete-modal">
        <div class="delete-box">
            <p>确定删除该用户的所有对话？</p>
            <button class="cancel-delete" id="cancelDeleteBtn">取消</button>
            <button class="confirm-delete" id="confirmDeleteBtn">删除</button>
        </div>
    </div>

    <div id="toastMsg" class="toast"></div>

    <script>
        (function() {
            const SB_URL = 'https://fflovhydzllmzqbvwktt.supabase.co';
            const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZmbG92aHlkemxsbXpxYnZ3a3R0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MzY4NjAsImV4cCI6MjA5NzAxMjg2MH0.vMOp1pFEb6G4bj6iyAyR7KU5itGdoAoIZXaNuT6qZm4';
            
            const supabase = window.supabase.createClient(SB_URL, SB_KEY);
            
            let currentUserEmail = null;
            let deleteTargetEmail = null;
            let currentChannel = null;
            
            function showToast(msg) {
                const toast = document.getElementById('toastMsg');
                toast.textContent = msg;
                toast.style.opacity = '1';
                setTimeout(() => toast.style.opacity = '0', 2000);
            }
            
            function escapeHtml(str) {
                if (!str) return '';
                return str.replace(/[&<>]/g, function(m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    return m;
                });
            }
            
            function formatTime(dateStr) {
                return new Date(dateStr).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            }
            
            // 加载用户列表
            async function loadUsers() {
                const { data: messages } = await supabase.from('livechat_messages').select('*').order('created_at', { ascending: true });
                if (!messages) return;
                
                const { data: replies } = await supabase.from('message_replies').select('*');
                const replyCount = {};
                if (replies) {
                    for (let r of replies) replyCount[r.message_id] = (replyCount[r.message_id] || 0) + 1;
                }
                
                // 按用户分组
                const users = {};
                for (let msg of messages) {
                    if (!users[msg.email]) {
                        users[msg.email] = { name: msg.name, email: msg.email, messages: [] };
                    }
                    users[msg.email].messages.push(msg);
                }
                
                // 更新统计
                const totalMessages = messages.length;
                const unreadCount = messages.filter(m => !replyCount[m.id]).length;
                document.getElementById('totalCount').innerText = totalMessages;
                document.getElementById('unreadCount').innerText = unreadCount;
                document.getElementById('repliedCount').innerText = totalMessages - unreadCount;
                document.getElementById('userCount').innerText = Object.keys(users).length;
                
                // 渲染用户列表
                const container = document.getElementById('userList');
                if (Object.keys(users).length === 0) {
                    container.innerHTML = '<div class="text-center py-8 text-gray-400">暂无用户</div>';
                    return;
                }
                
                let html = '';
                for (let email in users) {
                    const u = users[email];
                    const lastMsg = u.messages[u.messages.length - 1];
                    const hasUnread = !replyCount[lastMsg.id];
                    html += `
                        <div class="user-item ${hasUnread ? 'has-unread' : ''}">
                            <div class="flex-1" onclick="window.openUserChat('${escapeHtml(email)}')">
                                <div><span class="font-semibold">${escapeHtml(u.name)}</span> <span class="text-gray-400 text-sm">${escapeHtml(email)}</span></div>
                                <div class="text-sm text-gray-500 mt-1">${escapeHtml(lastMsg.message.substring(0, 50))}</div>
                                <div class="text-xs text-gray-400 mt-1">${new Date(lastMsg.created_at).toLocaleString()}</div>
                            </div>
                            <button class="delete-btn" onclick="event.stopPropagation(); window.deleteUser('${escapeHtml(email)}')">删除</button>
                        </div>
                    `;
                }
                container.innerHTML = html;
            }
            
            // 加载聊天消息
            async function loadChatMessages(email) {
                const { data: messages } = await supabase.from('livechat_messages').select('*').eq('email', email).order('created_at', { ascending: true });
                if (!messages || messages.length === 0) return;
                
                const msgIds = messages.map(m => m.id);
                const { data: replies } = await supabase.from('message_replies').select('*').in('message_id', msgIds).order('created_at', { ascending: true });
                
                const repliesByMsg = {};
                if (replies) {
                    for (let r of replies) {
                        if (!repliesByMsg[r.message_id]) repliesByMsg[r.message_id] = [];
                        repliesByMsg[r.message_id].push(r);
                    }
                }
                
                const user = messages[0];
                document.getElementById('chatUserName').innerHTML = escapeHtml(user.name);
                document.getElementById('chatUserEmail').innerHTML = escapeHtml(user.email);
                
                let html = '';
                for (let msg of messages) {
                    html += `
                        <div class="chat-message user">
                            <div class="bubble user">
                                <div>${escapeHtml(msg.message)}</div>
                                <div class="msg-time">${formatTime(msg.created_at)}</div>
                            </div>
                        </div>
                    `;
                    
                    if (repliesByMsg[msg.id] && repliesByMsg[msg.id].length > 0) {
                        html += `<div class="replies">`;
                        for (let r of repliesByMsg[msg.id]) {
                            html += `
                                <div class="reply-item">
                                    <div class="reply-bubble">
                                        <div>${escapeHtml(r.reply)}</div>
                                        <div class="reply-time">${new Date(r.created_at).toLocaleString()}</div>
                                    </div>
                                </div>
                            `;
                        }
                        html += `</div>`;
                    }
                }
                document.getElementById('chatMessages').innerHTML = html;
                const msgArea = document.getElementById('chatMessages');
                msgArea.scrollTop = msgArea.scrollHeight;
            }
            
            // 发送回复
            async function sendReply() {
                const msg = document.getElementById('msgInput').value.trim();
                if (!msg) return;
                if (!currentUserEmail) { showToast('请先选择用户'); return; }
                
                const { data: msgs } = await supabase.from('livechat_messages').select('id').eq('email', currentUserEmail).order('created_at', { ascending: false }).limit(1);
                if (!msgs || msgs.length === 0) { showToast('没有可回复的消息'); return; }
                
                const lastMsgId = msgs[0].id;
                const { error } = await supabase.from('message_replies').insert([{
                    message_id: lastMsgId,
                    reply: msg,
                    created_at: new Date().toISOString()
                }]);
                
                if (error) {
                    showToast('发送失败: ' + error.message);
                } else {
                    document.getElementById('msgInput').value = '';
                    showToast('已发送');
                    await loadChatMessages(currentUserEmail);
                }
            }
            
            // 删除用户
            window.deleteUser = function(email) {
                deleteTargetEmail = email;
                document.getElementById('deleteModal').classList.add('show');
            };
            
            async function confirmDelete() {
                if (!deleteTargetEmail) return;
                const { data: msgs } = await supabase.from('livechat_messages').select('id').eq('email', deleteTargetEmail);
                if (msgs && msgs.length > 0) {
                    const msgIds = msgs.map(m => m.id);
                    await supabase.from('message_replies').delete().in('message_id', msgIds);
                }
                await supabase.from('livechat_messages').delete().eq('email', deleteTargetEmail);
                showToast('已删除');
                document.getElementById('deleteModal').classList.remove('show');
                loadUsers();
                if (currentUserEmail === deleteTargetEmail) {
                    document.getElementById('chatModal').classList.remove('show');
                }
                deleteTargetEmail = null;
            }
            
            // 打开用户聊天
            window.openUserChat = async function(email) {
                currentUserEmail = email;
                await loadChatMessages(email);
                document.getElementById('chatModal').classList.add('show');
                document.getElementById('msgInput').focus();
            };
            
            // 设置实时订阅
            function setupRealtime() {
                if (currentChannel) {
                    supabase.removeChannel(currentChannel);
                }
                
                currentChannel = supabase.channel('admin-realtime')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'livechat_messages' }, () => {
                        console.log('实时: 消息变化');
                        loadUsers();
                        if (currentUserEmail) loadChatMessages(currentUserEmail);
                    })
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'message_replies' }, () => {
                        console.log('实时: 回复变化');
                        loadUsers();
                        if (currentUserEmail) {
                            loadChatMessages(currentUserEmail);
                        }
                    })
                    .subscribe((status) => {
                        console.log('订阅状态:', status);
                    });
            }
            
            // 事件绑定
            document.getElementById('refreshBtn').onclick = loadUsers;
            document.getElementById('closeChatBtn').onclick = () => document.getElementById('chatModal').classList.remove('show');
            document.getElementById('sendBtn').onclick = sendReply;
            document.getElementById('cancelDeleteBtn').onclick = () => document.getElementById('deleteModal').classList.remove('show');
            document.getElementById('confirmDeleteBtn').onclick = confirmDelete;
            
            const inputField = document.getElementById('msgInput');
            if (inputField) {
                inputField.onkeypress = function(e) {
                    if (e.key === 'Enter') sendReply();
                };
            }
            
            // 启动
            loadUsers();
            setupRealtime();
        })();
    </script>
</body>
</html>
